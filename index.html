<!DOCTYPE html>
<html>
<head>
  <title>Amma Hotel Menu</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    header {
      background: #ff5722;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .section-title {
      font-size: 22px;
      margin-top: 20px;
      margin-bottom: 10px;
      color: #333;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price {
      color: #ff5722;
      font-weight: bold;
    }

    .btn {
      background: #ff5722;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: #e64a19;
    }
  </style>

</head>
<body>

<header>🍽️ Amma Hotel</header>

<div class="container">

  <div class="section-title">Breakfast</div>

  <div class="card">
    <span>Masala Dosa</span>
    <span class="price">₹80</span>
  </div>

  <div class="card">
    <span>Idli Vada</span>
    <span class="price">₹50</span>
  </div>

  <div class="section-title">Meals</div>

  <div class="card">
    <span>Veg Meals</span>
    <span class="price">₹120</span>
  </div>

  <div class="section-title">Drinks</div>

  <div class="card">
    <span>Filter Coffee</span>
    <span class="price">₹30</span>
  </div>

</div>

</body>
</html>
