<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amma Hotel</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f3f3;
}

header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:10px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100px;
    height:100px;
    border-radius:10px;
    object-fit:cover;
}

.info{
    flex:1;
    margin-left:15px;
}

.name{
    font-size:20px;
    font-weight:bold;
}

.price{
    color:#ff5722;
    margin-top:5px;
    font-size:18px;
}

button{
    background:#ff5722;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#e64a19;
}

.cart{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.total{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.pay-btn{
    width:100%;
    margin-top:15px;
    padding:15px;
    font-size:18px;
}

</style>
</head>

<body>

<header>
🍽️ Amma Hotel
</header>

<div class="container" id="menu"></div>

<div class="container">
    <div class="cart">
        <h2>🧾 Order Summary</h2>

        <div id="cart-items"></div>

        <div class="total" id="total">
            Total: ₹0
        </div>

        <button class="pay-btn" onclick="payNow()">
            💳 Pay Now
        </button>
    </div>
</div>

<script>

const foods = [

{
    name:"Masala Dosa",
    price:80,
    image:"https://images.unsplash.com/photo-1668236543090-82eba5ee5976?q=80&w=800"
},

{
    name:"Idli Vada",
    price:50,
    image:"https://images.unsplash.com/photo-1589302168068-964664d93dc0?q=80&w=800"
},

{
    name:"Veg Meals",
    price:120,
    image:"https://images.unsplash.com/photo-1512058564366-18510be2db19?q=80&w=800"
},

{
    name:"Filter Coffee",
    price:30,
    image:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=800"
}

];

let cart = [];

function showMenu(){

    let output = "";

    foods.forEach((food,index)=>{

        output += `

        <div class="card">

            <img src="${food.image}">

            <div class="info">

                <div class="name">${food.name}</div>

                <div class="price">₹${food.price}</div>

            </div>

            <button onclick="addToCart(${index})">
                Add
            </button>

        </div>

        `;

    });

    document.getElementById("menu").innerHTML = output;

}

function addToCart(index){

    cart.push(foods[index]);

    updateCart();

}

function updateCart(){

    let items = "";
    let total = 0;

    cart.forEach(food=>{

        items += `
            <p>${food.name} - ₹${food.price}</p>
        `;

        total += food.price;

    });

    document.getElementById("cart-items").innerHTML = items;

    document.getElementById("total").innerHTML =
    `Total: ₹${total}`;

}

function payNow(){

    alert("✅ Payment Successful!\n\n👨‍🍳 Order Sent To Kitchen");

}

showMenu();

</script>

</body>
</html>
