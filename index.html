<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amma Mess</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#751A1A;
}

background: rgba(255,255,255,0.2);
backdrop-filter: blur(10px);
    
header{
    background:linear-gradient(135deg, #ff5722, #ff9800);;
    color:white;
    text-align:center;
    padding:25px;
    font-size:25px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:10px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:150px;
    height:150px;
    border-radius:10px;
    object-fit:cover;
}

.card{
    transition:0.5s;
} 
    
.info{
    flex:1;
    margin-left:15px;
}

.name{
    font-size:20px;
    font-weight:bold;
}

.price{
    color:#FFFFFF;
    margin-top:5px;
    font-size:18px;
}

button{
    background:#ff5722;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#e64a19;
}

.cart{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.total{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.pay-btn{
    width:100%;
    margin-top:15px;
    padding:15px;
    font-size:18px;
}

</style>
</head>

<body>

<header>
🍽️ Amma Mess
</header>

<div class="container" id="menu"></div>

<div class="container">
    <div class="cart">
        <h2>🧾 Order Summary</h2>

        <div id="cart-items"></div>

        <div class="total" id="total">
            Total: ₹0
        </div>

        <button class="pay-btn" onclick="payNow()">
            💳 Order Now
        </button>
    </div>
</div>

<script>

const foods = [

{
    name:"Masala Dosa",
    price:80,
    image:"https://i1-e.pinimg.com/1200x/99/ee/a0/99eea08c91fdadd332686fa9832d9d47.jpg"
},

{
    name:"Idli Vada",
    price:50,
    image:"https://i1-e.pinimg.com/1200x/34/74/6b/34746bec59e01d8aff50255bc0d75c30.jpg"
},

{
    name:"Sounth Indian Meals",
    price:120,
    image:"https://i.pinimg.com/736x/05/a8/2a/05a82ad4d9b3a51c6266578a2ff4d796.jpg"
},

{
    name:"North Indian Meals",
    price:150,
    image:"https://i1-e.pinimg.com/736x/26/24/b4/2624b46fbf64636d9359e8cd7b2251f4.jpg"
},

{
    name:"Fresh Juice",
    price:80,
    image:"https://i.pinimg.com/736x/36/b6/fe/36b6fe3850a7c6e1b3e680c59da4fa03.jpg"
},
  
{
    name:"Filter Coffee",
    price:30,
    image:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=800"
}

];

let cart = [];

function showMenu(){

    let output = "";

    foods.forEach((food,index)=>{

        output += `

        <div class="card">

            <img src="${food.image}">

            <div class="info">

                <div class="name">${food.name}</div>

                <div class="price">₹${food.price}</div>

            </div>

            <button onclick="addToCart(${index})">
                Add
            </button>

        </div>

        `;

    });

    document.getElementById("menu").innerHTML = output;

}

function addToCart(index){

    cart.push(foods[index]);

    updateCart();

}

function updateCart(){

    let items = "";
    let total = 0;

    cart.forEach(food=>{

        items += `
            <p>${food.name} - ₹${food.price}</p>
        `;

        total += food.price;

    });

    document.getElementById("cart-items").innerHTML = items;

    document.getElementById("total").innerHTML =
    `Total: ₹${total}`;

}

function payNow(){

    alert("✅ Payment Successful!\n\n👨‍🍳 Order Sent To Kitchen");

}

showMenu();

</script>

</body>
</html>
